name: Publish phantomlint to PyPI

# Publish on tag pushes matching v*.*.* (e.g. v0.1.0, v1.2.3).
# Uses PyPI Trusted Publishers (OIDC) - no PYPI_TOKEN secret needed.
# Setup once at https://pypi.org/manage/account/publishing/ for the project.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publisher)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/phantomlint
    permissions:
      id-token: write   # required for OIDC -> PyPI Trusted Publisher
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
